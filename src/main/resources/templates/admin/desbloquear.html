<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Desbloquear Cliente</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/styles/cajero.css}">
</head>
<body>
<div class="container">
    <div class="admin-panel admin-form-panel">
        <h2><i class="fas fa-unlock-alt"></i> Desbloquear Cliente</h2>

        <p class="admin-description">Restablece el acceso de un cliente bloqueado asignando un nuevo PIN.</p>

        <div th:if="${mensaje}" th:class="${error} ? 'mensaje-error' : 'mensaje-exito'" th:text="${mensaje}"></div>

        <form th:action="@{/admin/desbloquear}" method="post">
            <div class="form-group">
                <label for="identificacionCliente"><i class="fas fa-id-card"></i> Identificacion del cliente:</label>
                <input type="text" id="identificacionCliente" name="identificacionCliente" required maxlength="50" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="nuevoPin"><i class="fas fa-key"></i> Nuevo PIN:</label>
                <input type="password" id="nuevoPin" name="nuevoPin" required minlength="4" maxlength="6" pattern="[0-9]*" inputmode="numeric">
            </div>

            <button type="submit"><i class="fas fa-unlock"></i> Desbloquear cliente</button>
        </form>

        <a th:href="@{/admin/}" class="btn-secondary"><i class="fas fa-arrow-left"></i> Volver al panel</a>
    </div>
</div>
</body>
</html>
