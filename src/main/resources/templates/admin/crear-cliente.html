<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Cliente</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/styles/cajero.css}">
</head>
<body>
<div class="container">
    <div class="admin-panel admin-form-panel">
        <h2><i class="fas fa-user-plus"></i> Crear Cliente</h2>

        <p class="admin-description">Registra un nuevo cliente con su identificacion y PIN inicial.</p>

        <div th:if="${mensaje}" th:class="${error} ? 'mensaje-error' : 'mensaje-exito'" th:text="${mensaje}"></div>

        <form th:action="@{/admin/crear-cliente}" th:object="${cliente}" method="post">
            <div class="form-group">
                <label for="nombre"><i class="fas fa-user"></i> Nombre completo:</label>
                <input type="text" id="nombre" th:field="*{nombre}" required maxlength="120" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="identificacionCliente"><i class="fas fa-id-card"></i> Identificacion del cliente:</label>
                <input type="text" id="identificacionCliente" th:field="*{identificacionCliente}" required maxlength="50" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="pin"><i class="fas fa-lock"></i> PIN inicial:</label>
                <input type="password" id="pin" th:field="*{pin}" required minlength="4" maxlength="6" pattern="[0-9]*" inputmode="numeric">
            </div>

            <button type="submit"><i class="fas fa-save"></i> Crear cliente</button>
        </form>

        <a th:href="@{/admin/}" class="btn-secondary"><i class="fas fa-arrow-left"></i> Volver al panel</a>
    </div>
</div>
</body>
</html>
