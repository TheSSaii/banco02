<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Cuenta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/styles/cajero.css}">
</head>
<body>
<div class="container">
    <div class="admin-panel admin-form-panel">
        <h2><i class="fas fa-credit-card"></i> Crear Cuenta</h2>

        <p class="admin-description">Asocia una nueva cuenta a un cliente existente usando su identificacion.</p>

        <div th:if="${mensaje}" th:class="${error} ? 'mensaje-error' : 'mensaje-exito'" th:text="${mensaje}"></div>

        <form th:action="@{/admin/crear-cuenta}" method="post">
            <div class="form-group">
                <label for="identificacionCliente"><i class="fas fa-id-card"></i> Identificacion del cliente:</label>
                <input type="text" id="identificacionCliente" name="identificacionCliente" required maxlength="50" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="numeroCuenta"><i class="fas fa-hashtag"></i> Numero de cuenta:</label>
                <input type="text" id="numeroCuenta" name="numeroCuenta" required maxlength="50" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="tipoCuenta"><i class="fas fa-wallet"></i> Tipo de cuenta:</label>
                <select id="tipoCuenta" name="tipoCuenta" required>
                    <option value="" disabled selected>Selecciona un tipo</option>
                    <option th:each="tipo : ${tiposCuenta}" th:value="${tipo}" th:text="${tipo}"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="saldo"><i class="fas fa-money-bill-wave"></i> Saldo inicial:</label>
                <input type="number" id="saldo" name="saldo" required min="0" step="0.01" inputmode="decimal">
            </div>

            <button type="submit"><i class="fas fa-save"></i> Crear cuenta</button>
        </form>

        <a th:href="@{/admin/}" class="btn-secondary"><i class="fas fa-arrow-left"></i> Volver al panel</a>
    </div>
</div>
</body>
</html>
